

<div class="stock-container">
  <div class="name">
    {{ stock.name + ' (' + stock.code + ')' }}
  </div>

  <div class="price"
       [class]="stock.isPositiveChange() ? 'positive' : 'negative'">
    $ {{ stock.price }}
  </div>

  <div class="exchange">{{ stock.exchange }}</div>

  <button (click)="toggleFavorite($event)"
          [disabled]="stock.favorite">
    Add to Favorite
  </button>
</div>
